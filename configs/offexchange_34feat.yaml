# Off-exchange 34-feature evaluation config
# Source: basic-quote-processor NVDA 60s bins, 233 days

export_dir: "../data/exports/basic_nvda_60s"
split: "train"
holdout_days: 20
seed: 42

screening:
  horizons: [1, 2, 3, 5, 10, 20, 30, 60]
  bh_fdr_level: 0.05
  ic_threshold: 0.05
  dcor_permutations: 500
  mi_k: 5

stability:
  n_bootstraps: 50
  subsample_fraction: 0.8
  stable_threshold: 0.6
  investigate_threshold: 0.4

classification:
  strong_keep_p: 0.01
  ic_ir_threshold: 0.5

verbose: true
